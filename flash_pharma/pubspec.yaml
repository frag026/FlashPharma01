name: flash_pharma
description: Flash Pharma - Medicine Delivery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  provider: ^6.1.2
  # Navigation
  go_router: ^14.2.0
  # Network
  http: ^1.2.1
  dio: ^5.4.3
  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  # Maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Search
  algolia_helper_flutter: ^1.0.0
  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  # Payment
  razorpay_flutter: ^1.3.7
  # UI
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  badges: ^3.1.2
  pinput: ^5.0.0
  # Utils
  url_launcher: ^6.2.5
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  uuid: ^4.4.0
  timeago: ^3.6.1
  # Auth
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
